<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Favorites | HouseRent</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <h2>🏠 HouseRent</h2>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="#" onclick="Auth.logout()" class="btn btn-secondary">Logout</a>
      </div>
    </div>
  </nav>

  <section class="auth-container">
    <div class="auth-card glass" style="max-width:1100px;">
      <h2>💾 My Favorites</h2>
      <p class="auth-subtitle">Your saved houses appear here.</p>
      
      <div id="favoritesList" class="properties-grid">
        <!-- saved houses show here -->
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script src="houses.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderFavorites();  // ONLY favorites, no filters
    });
  </script>
</body>
</html>
